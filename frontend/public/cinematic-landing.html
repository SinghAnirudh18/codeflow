  <!-- ── FadingVideo Component ── -->
  <script type="text/babel">
    const { useRef, useEffect } = React;
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      function fadeTo(video, target, duration) {
        cancelAnimationFrame(rafRef.current);
        const start = performance.now();
        const startOpacity = parseFloat(video.style.opacity) || 0;

        function tick(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          video.style.opacity = startOpacity + (target - startOpacity) * progress;
          if (progress < 1) {
            rafRef.current = requestAnimationFrame(tick);
          }
        }
        rafRef.current = requestAnimationFrame(tick);
      }

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.style.opacity = '0';

        function onLoadedData() {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(video, 1, FADE_MS);
        }

        function onTimeUpdate() {
          const remaining = video.duration - video.currentTime;
          if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(video, 0, FADE_MS);
          }
        }

        function onEnded() {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(video, 1, FADE_MS);
          }, 100);
        }

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    }

    window.FadingVideo = FadingVideo;
  </script>

  <!-- ── BlurText Component ── -->
  <script type="text/babel">
    const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;
    const { motion } = window.Motion;

    function BlurText({ text, className }) {
      const [isVisible, setIsVisible] = useStateBT(false);
      const ref = useRefBT(null);

      useEffectBT(() => {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setIsVisible(true); },
          { threshold: 0.1 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);

      const words = text.split(' ');

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={isVisible ? {
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0],
              } : {}}
              transition={{
                duration: 0.7,
                delay: (i * 100) / 1000,
                times: [0, 0.5, 1],
                ease: 'easeOut',
              }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    window.BlurText = BlurText;
  </script>
